worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 8080;
        root /opt/app-root/src;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' cdn.segment.com assets.adobedtm.com static.redhat.com www.redhat.com consent.trustarc.com consent-pref.trustarc.com; connect-src 'self' cdn.segment.com api.segment.io smetrics.redhat.com hooks.workato.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; frame-src consent.trustarc.com consent-pref.trustarc.com;" always;
    }
}
