name: Build and Push Image

on:
  push:
    branches: [master]

env:
  IMAGE_NAME: sandbox-dashboard
  IMAGE_REGISTRY: quay.io
  IMAGE_NAMESPACE: codeready-toolchain

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        uses: redhat-actions/buildah-build@v2
        id: build
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: latest ${{ github.sha }}
          containerfiles: ./Containerfile

      - name: Login to Quay.io
        env:
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          set -euo pipefail
          REGISTRY_AUTH_FILE="${RUNNER_TEMP}/containers-auth.json"
          export REGISTRY_AUTH_FILE
          echo "REGISTRY_AUTH_FILE=${REGISTRY_AUTH_FILE}" >> "${GITHUB_ENV}"
          CREDS="$(printf '%s' "${QUAY_TOKEN}" | base64 -d)"
          podman login --authfile "${REGISTRY_AUTH_FILE}" \
            --username "${CREDS%%:*}" \
            --password "${CREDS#*:}" \
            quay.io

      - name: Push image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}
